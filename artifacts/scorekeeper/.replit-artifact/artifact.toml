kind = "web"
previewPath = "/"
title = "Board Game Score Tracker"
version = "1.0.0"
id = "artifacts/scorekeeper"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
localPort = 21214
name = "web"
paths = ["/"]

[services.development]
run = "pnpm --filter @workspace/scorekeeper run dev"

[services.env]
PORT = "21214"
BASE_PATH = "/"

[services.production]
build = ["pnpm", "--filter", "@workspace/scorekeeper", "run", "build"]
publicDir = "artifacts/scorekeeper/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"
